<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vindly</title>
    <script>
        // Sprawdzamy język przeglądarki. Jeśli zaczyna się od 'pl', rzucamy do Polski. W przeciwnym razie global (EN).
        var userLang = navigator.language || navigator.userLanguage || "";
        if (userLang.toLowerCase().indexOf('pl') === 0) {
            window.location.replace("/pl/");
        } else {
            window.location.replace("/en/");
        }
    </script>
</head>
<body>
    <p>Redirecting to <a href="/en/">Vindly International</a> or <a href="/pl/">Vindly Polska</a>...</p>
</body>
</html>
